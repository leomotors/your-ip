<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Instantly see your public IP address, version, type, and how it was detected. Minimal, fast, open-source."
    />
    <title>Your IP</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --glass-bg: rgba(255, 255, 255, 0.45);
        --glass-border: rgba(255, 255, 255, 0.6);
        --glass-shadow: rgba(31, 38, 135, 0.12);
        --text-primary: #1a1a2e;
        --text-secondary: #444;
        --accent: #6c63ff;
        --accent-light: #a29bfe;
      }

      body {
        font-family:
          "Inter",
          "SF Pro Display",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #e0e7ff 0%,
          #f0e6ff 40%,
          #fce4ec 70%,
          #e8f5e9 100%
        );
        background-size: 300% 300%;
        animation: gradientShift 12s ease infinite;
        overflow: hidden;
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Floating ambient orbs */
      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.35;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        width: 420px;
        height: 420px;
        background: radial-gradient(circle, #a29bfe, transparent);
        top: -80px;
        right: -100px;
        animation: float1 8s ease-in-out infinite alternate;
      }

      body::after {
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, #fd79a8, transparent);
        bottom: -60px;
        left: -60px;
        animation: float2 10s ease-in-out infinite alternate;
      }

      @keyframes float1 {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(-40px, 60px);
        }
      }

      @keyframes float2 {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(50px, -40px);
        }
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 520px;
        padding: 1.5rem;
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 3rem 2.5rem;
        box-shadow: 0 8px 32px var(--glass-shadow);
        text-align: center;
        animation: cardIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .title {
        font-size: 1.1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--accent);
        margin-bottom: 1.5rem;
      }

      .ip-display {
        font-size: 2.4rem;
        font-weight: 700;
        color: var(--text-primary);
        word-break: break-all;
        line-height: 1.3;
        min-height: 3.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s;
      }

      .ip-display.loading {
        opacity: 0.4;
      }

      .meta {
        margin-top: 2rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.65rem 1rem;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        font-size: 0.85rem;
        opacity: 0;
        animation: fadeRow 0.4s ease forwards;
      }

      .meta-row:nth-child(1) {
        animation-delay: 0.15s;
      }
      .meta-row:nth-child(2) {
        animation-delay: 0.25s;
      }
      .meta-row:nth-child(3) {
        animation-delay: 0.35s;
      }

      @keyframes fadeRow {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .meta-label {
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.75rem;
      }

      .meta-value {
        color: var(--text-primary);
        font-weight: 500;
        text-align: right;
        max-width: 65%;
        word-break: break-word;
      }

      .badge {
        display: inline-block;
        padding: 0.2rem 0.65rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .badge-public {
        background: rgba(108, 99, 255, 0.12);
        color: var(--accent);
      }

      .badge-private {
        background: rgba(0, 184, 148, 0.12);
        color: #00b894;
      }

      .badge-special {
        background: rgba(253, 121, 168, 0.12);
        color: #e84393;
      }

      .error-msg {
        color: #d63031;
        font-size: 0.9rem;
        margin-top: 1rem;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(108, 99, 255, 0.2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .subtitle {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 2rem;
        opacity: 0.7;
        line-height: 1.5;
      }

      .footer {
        margin-top: 2rem;
        font-size: 0.7rem;
        color: rgba(0, 0, 0, 0.3);
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
      }

      .footer a {
        color: rgba(0, 0, 0, 0.4);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        transition: color 0.2s;
      }

      .footer a:hover {
        color: var(--accent);
      }

      .footer svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .card {
          padding: 2rem 1.5rem;
          border-radius: 20px;
        }
        .ip-display {
          font-size: 1.7rem;
        }
        body::before {
          width: 250px;
          height: 250px;
        }
        body::after {
          width: 200px;
          height: 200px;
        }
      }

      @media (min-width: 768px) {
        .ip-display {
          font-size: 2.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="title">Your IP</div>
        <p class="subtitle">Your IP address, detected instantly.</p>
        <div class="ip-display loading" id="ip-display">
          <div class="spinner"></div>
        </div>
        <div class="meta" id="meta" style="display: none">
          <div class="meta-row">
            <span class="meta-label">Type</span>
            <span class="meta-value" id="ip-type"></span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Version</span>
            <span class="meta-value" id="ip-version"></span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Detected via</span>
            <span class="meta-value" id="ip-method"></span>
          </div>
        </div>
        <div class="error-msg" id="error" style="display: none"></div>
        <div class="footer">
          <a
            href="https://github.com/leomotors/your-ip"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
              />
            </svg>
            leomotors/your-ip
          </a>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const ipDisplay = document.getElementById("ip-display");
        const meta = document.getElementById("meta");
        const error = document.getElementById("error");

        function badgeClass(ipType) {
          if (ipType === "Public") return "badge-public";
          if (ipType.startsWith("Private") || ipType.startsWith("CGNAT"))
            return "badge-private";
          return "badge-special";
        }

        fetch("/api/ip", { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("Server returned " + res.status);
            return res.json();
          })
          .then(function (data) {
            ipDisplay.classList.remove("loading");
            ipDisplay.textContent = data.ip;

            document.getElementById("ip-type").innerHTML =
              '<span class="badge ' +
              badgeClass(data.ipType) +
              '">' +
              data.ipType +
              "</span>";
            document.getElementById("ip-version").textContent = data.version;
            document.getElementById("ip-method").textContent = data.method;

            meta.style.display = "";
          })
          .catch(function (err) {
            ipDisplay.classList.remove("loading");
            ipDisplay.textContent = "—";
            error.textContent = "Failed to detect IP: " + err.message;
            error.style.display = "";
          });
      })();
    </script>
  </body>
</html>
